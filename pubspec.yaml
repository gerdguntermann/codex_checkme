name: checkme
description: "My Daily OK – health monitoring app. Press the button regularly or your contacts get notified."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  shared_preferences: ^2.3.2

  # Background
  workmanager: ^0.9.0+3
  permission_handler: ^11.3.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  equatable: ^2.0.5

  # Utilities
  uuid: ^4.4.2
  path_provider: ^2.1.4
  json_annotation: ^4.9.0
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  fake_cloud_firestore: ^3.0.2
  firebase_auth_mocks: ^0.14.0

flutter:
  uses-material-design: true
  generate: true
