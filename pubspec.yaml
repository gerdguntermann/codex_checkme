name: checkme
description: "Health monitoring app - press the button regularly or contacts get notified."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  shared_preferences: ^2.3.2

  # Background
  workmanager: ^0.9.0+3

  # DI
  get_it: ^8.0.2

  # Functional
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Utilities
  uuid: ^4.4.2
  json_annotation: ^4.9.0
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
